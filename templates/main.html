<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arduino Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden;
    }

    header {
      text-align: center;
    }

    .menu-btn {
      position: fixed;
      top: 1rem;
      left: 1rem;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 0.85rem 1rem;
      border: none;
      cursor: pointer;
      border-radius: 999px;
      z-index: 1000;
      font-size: 1rem;
    }
    .menu-btn.hide {
      opacity: 0;
      pointer-events: none;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -100%; 
      width: min(320px, 80vw);
      height: 100%;
      background: #111;
      transition: left 0.3s ease;
      padding: 1rem;
      overflow-y: auto;
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    .sidebar.active {
      left: 0;      
    }

    .sensor-card {
      margin: 1rem 0;
      border-radius: 14px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s ease;
      color: #fff;
      padding: 1.5rem 1rem;
      background-size: cover;
      background-position: center;
      backdrop-filter: blur(10px);
      background-color: rgba(255,255,255,0.03);
    }

    .sensor-card:hover {
      transform: scale(1.05);
      opacity: 0.5;
    }

    .sensor-card h3 {
      margin: 0.5rem 0;
      background: rgba(0,0,0,0.5);
      display: inline-block;
      padding: 5px 10px;
      border-radius: 5px;
    }

    .video-container {
      position: relative;
      width: 100vw;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      min-height: 30vh;
      height: auto;
      overflow: hidden;
      border-radius: 0;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.5), 0 20px 45px rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .video-container::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(0,0,0,0.45), transparent 30%, rgba(0,0,0,0.65));
    }

    .video-container iframe,
    .video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: 0;
    }

    .video-overlay {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #fff;
      padding: 0 1rem;
      width: 100%;
      max-width: 640px;
    }

    .video-overlay h1 {
      margin: 0;
      font-size: clamp(3.2rem, 10vw, 4.5rem);
      line-height: 1.02;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Bebas Neue', sans-serif;
      font-weight: 700;
      color: transparent;
      background: repeating-linear-gradient(90deg,
        #fff 0 5px,
        rgba(255,255,255,0) 5px 10px);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.15);
    }

    .video-overlay p {
      margin: 1rem auto 0;
      color: #b6f7ff;
      font-size: clamp(0.85rem, 2vw, 1rem);
      letter-spacing: 0.16rem;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .install-btn {
      display: inline-flex;
      margin-top: 1.5rem;
      padding: 0.85rem 1.4rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
      min-width: 160px;
    }

    .install-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.18);
    }

    .hidden {
      display: none !important;
    }

    .sensor-card p {
      background: rgba(0,0,0,0.5);
      display: inline-block;
      padding: 3px 8px;
      border-radius: 5px;
    }

    .close-btn {
      background: #000;
      color: #fff;
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
      margin-bottom: 1rem;
    }
  </style>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
</head>
<body>
  <button id="menu-btn" class="menu-btn" onclick="openMenu()">☰</button>

  <div class="video-container">
    <video src="static/Video Project 1.mp4" autoplay muted loop playsinline></video>
    <div class="video-overlay">
      <h1>Welcome</h1>
      <p>{{ name }}</p>
      <button id="installBtn" class="install-btn hidden">Install App</button>
    </div>
  </div>

  <div class="sidebar" id="sidebar">
    <button  class="close-btn" onclick="closeMenu()">✖ Close</button>

    <div class="sensor-card" 
         style="background-image: url('static/pixlr-image-6a3395ae6eb568ca84f0787b.png');" 
         onclick="goTo('/arduino')">
      <h3>MONITORING SYSTEM</h3>
      <p>Arduino sensor</p>
    </div>

    <div class="sensor-card" 
         style="background-image: url('static/pixlr-image-6a33989c664c5064ff24ee2c.jpg');" 
         onclick="goTo('/')">
      <h3>SQL DATABASE</h3>
      <p>Data & Information</p>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js')
        .then(() => console.log('Service worker registered.'))
        .catch(err => console.log('Service worker failed:', err));
    }

    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredPrompt = event;
      installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        installBtn.classList.add('hidden');
      }
      deferredPrompt = null;
    });

    function openMenu() {
      document.getElementById('sidebar').classList.add('active');
      document.getElementById('menu-btn').classList.add('hide');
      document.querySelector('.video-overlay').classList.add('hidden');
    }

    function closeMenu() {
      document.getElementById('sidebar').classList.remove('active');
      document.getElementById('menu-btn').classList.remove('hide');
      document.querySelector('.video-overlay').classList.remove('hidden');
    }

    function goTo(route) {
      window.location.href = route;
    }
  </script>
</body>
</html>
