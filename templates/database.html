<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nike Clone</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    header { background: black; color: white; padding: 1rem; }
    nav { display: flex; justify-content: space-between; align-items: center; }
    nav ul { list-style: none; display: flex; gap: 1rem; margin: 0; padding: 0; }
    nav a { color: white; text-decoration: none; font-weight: bold; }
    .hero { background: black; color: white; text-align: center; padding: 5rem 2rem; }
    .hero h2 { font-size: 3rem; margin-bottom: 1rem; }
    .btn { background: white; color: black; padding: 0.75rem 1.5rem; text-decoration: none; font-weight: bold; border-radius: 5px; }
    .products { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; padding: 2rem; }
    .product img { width: 100%; border-radius: 5px; }
    footer { background: #f4f4f4; text-align: center; padding: 1rem; margin-top: 2rem; }
  </style>
</head>
<body>
  <header>
    <nav>
      <h1 class="logo">Nike</h1>
      <ul>
        <li><a href="#">Men</a></li>
        <li><a href="#">Women</a></li>
        <li><a href="#">Kids</a></li>
        <li><a href="#">Sale</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h2>New Arrivals</h2>
    <p>Shop the latest sneakers and apparel.</p>
    <a href="#" class="btn">Shop Now</a>
  </section>

  <section class="products">
    <div class="product">
      <img src="https://via.placeholder.com/300x300" alt="Sneaker">
      <h3>Air Max</h3>
      <p>$120</p>
    </div>
    <div class="product">
      <img src="https://via.placeholder.com/300x300" alt="Sneaker">
      <h3>Jordan</h3>
      <p>$150</p>
    </div>
    <div class="product">
      <img src="https://via.placeholder.com/300x300" alt="Sneaker">
      <h3>Blazer</h3>
      <p>$100</p>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 Nike Clone</p>
  </footer>
</body>
</html>
