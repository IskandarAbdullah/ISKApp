<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator - IoT Gym App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #000000 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 28px;
            color: #333;
            margin: 0;
        }

        .header a {
            background: linear-gradient(135deg, #000000 0%, #000000 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .header a:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .form-card, .result-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .form-card h2, .result-card h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            color: #333;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #000000;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #999;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #000000 0%, #000000 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            display: block;
            padding: 12px 15px;
            background: #f5f5f5;
            border: 2px dashed #e0e0e0;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            color: #666;
        }

        .file-input-label:hover {
            background: #f0f0f0;
            border-color: #000000;
            color: #000000;
        }

        .result-card {
            display: none;
        }

        .result-card.show {
            display: block;
            animation: slideIn 0.5s ease-in;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-item label {
            font-weight: 600;
            color: #333;
            margin: 0;
        }

        .result-item span {
            color: #000000;
            font-weight: 700;
            font-size: 16px;
        }

        .bmi-badge {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 14px;
            margin-top: 15px;
        }

        .bmi-underweight { background: #3498db; color: white; }
        .bmi-normal { background: #2ecc71; color: white; }
        .bmi-overweight { background: #f39c12; color: white; }
        .bmi-obese { background: #e74c3c; color: white; }

        .result-image {
            margin-top: 20px;
            text-align: center;
        }

        .result-image img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .form-card, .result-card {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 BMI Calculator</h1>
            <div style="display: flex; gap: 10px;">
                <a href="/">🏠 Back to Home</a>
                <a href="/bmi_history">📈 View History</a>
            </div>
        </div>

        <div class="content">
            <div class="form-card">
                <h2>Enter Your Details</h2>
                <form action="/bmi" method="POST" enctype="multipart/form-data">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="age">Age</label>
                        <input type="number" id="age" name="age" min="1" max="150" placeholder="25" required>
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" name="weight" step="0.1" min="1" placeholder="70" required>
                    </div>

                    <div class="form-group">
                        <label for="height">Height (cm)</label>
                        <input type="number" id="height" name="height" step="0.1" min="1" placeholder="175" required>
                    </div>

                    <div class="form-group">
                        <label for="image">Profile Photo (Optional)</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="image" name="image" accept="image/*">
                            <label for="image" class="file-input-label">📸 Click to upload or drag and drop</label>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn">Calculate BMI</button>
                </form>
            </div>

            {% if bmi %}
            <div class="result-card show">
                <h2>Your Results</h2>

                <div class="result-item">
                    <label>Name:</label>
                    <span>{{ name }}</span>
                </div>

                <div class="result-item">
                    <label>Age:</label>
                    <span>{{ age }} years</span>
                </div>

                <div class="result-item">
                    <label>Gender:</label>
                    <span style="text-transform: capitalize;">{{ gender }}</span>
                </div>

                <div class="result-item">
                    <label>Weight:</label>
                    <span>{{ weight }} kg</span>
                </div>

                <div class="result-item">
                    <label>Height:</label>
                    <span>{{ height }} cm</span>
                </div>

                <div class="result-item">
                    <label>Your BMI:</label>
                    <span style="font-size: 24px;">{{ bmi }}</span>
                </div>

                <div class="bmi-badge bmi-{{ category|lower }}">
                    {{ category }}
                </div>

                {% if image_path %}
                <div class="result-image">
                    <p style="font-size: 12px; color: #999; margin-bottom: 10px;">PROFILE PHOTO</p>
                    <img src="{{ image_path }}" alt="User Photo">
                </div>
                {% endif %}
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
