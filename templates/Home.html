<!DOCTYPE html>
<html>
<head>
    <title>ISKANDAR WEBSITE</title>
        <style>
        body {
            background-image: url(/static/Untitled2_20260612003525.png);
            background-size: cover;      
            background-repeat: no-repeat; 
            background-attachment: fixed; 
        }
        h1 {
            font-family: 'Roboto', sans-serif;
            font-size: 42px;
            color: #ffffff;
            letter-spacing: 2px;  
        }
        p {
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            color: #ffffff;
            letter-spacing: 2px;   
        }
        p2 {
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            color: #ffffff;
            letter-spacing: 2px;  
            height: 100vh;                
            display: flex;
            justify-content: center;     
            align-items: flex-end;        
            margin: 0;

        }
        input[type="text"], input[type="password"] {
            width: 250px;
            padding: 8px;
            gap: 20px;
            border: 2px solid #4f4646;
            border-radius: 20px;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #0d0d20;
            font-size: 16px;
            transition: transform 0.2s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            transform: scale(1.06);
            background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
        }

        input::placeholder {
        color: rgb(4, 4, 34);          
        font-style: italic;   
        font-size: 14px;      
        }
        .form-container {
        display: flex;
        flex-direction: column; 
        gap: 20px;   
        align-items: center; 
        margin-bottom: 12px;
        }
        img {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }
        button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #444;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
        }
        button:hover {
            background-color: #666;
        }
        .floating-widget {
            display: block;
            position: relative; 
            top: 50%;                
            left: 50%;                
            transform: translate(-50%, -0%);  
            width: 200px;
            height: 200px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .floating-widget img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

    </style>
</head>
<body>
    <h1 style="text-align: center;">DIETARY APP</h1>
    <div style="opacity: 0.5;" class="floating-widget" id="widget">
        <img src="{{ url_for('static', filename='illustration-of-human-icon-user-symbol-icon-modern-design-on-blank-background-free-vector.jpg') }}" alt="Image 1">
    </div>

    <script>
        const images = [
            "{{ url_for('static', filename='illustration-of-human-icon-user-symbol-icon-modern-design-on-blank-background-free-vector.jpg') }}",
            "{{ url_for('static', filename='Screenshot_20220902-004054_Chrome.jpg') }}",
            "{{ url_for('static', filename='Screenshot_20220824-212612_Telegram.jpg') }}"
        ];

        let currentIndex = 0;
        const widget = document.getElementById("widget").querySelector("img");

        // Swipe logic (basic left/right with arrow keys)
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight") {
                currentIndex = (currentIndex + 1) % images.length;
                widget.src = images[currentIndex];
            }
            if (e.key === "ArrowLeft") {
                currentIndex = (currentIndex - 1 + images.length) % images.length;
                widget.src = images[currentIndex];
            }
        });

        // Touch swipe for mobile
        let startX = 0;
        widget.addEventListener("touchstart", (e) => {
            startX = e.touches[0].clientX;
        });
        widget.addEventListener("touchend", (e) => {
            let endX = e.changedTouches[0].clientX;
            if (endX < startX) { // swipe left
                currentIndex = (currentIndex + 1) % images.length;
            } else if (endX > startX) { // swipe right
                currentIndex = (currentIndex - 1 + images.length) % images.length;
            }
            widget.src = images[currentIndex];
        });
    </script>
    <p style="text-align: center;">login your account:</p>
    <form style="text-align: center;" action="/get_name" method="post">
        <div class="form-container">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="password" name="password" placeholder="Your Password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    <p2 style="text-align: center;">Don't have an account? Sign up now!</p2>
    <a href="/signup">Sign Up</a><br>
    <a href="/about">About</a>
    <a href="/arduino">Arduino Data</a>
</body>
</html>
